<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sistema de Gestión de Almacenes (WMS) para FCH Ingenieros — Control de inventario, movimientos y solicitudes de materiales de construcción." />
  <title>FCH Ingenieros — WMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- Animated background shapes -->
<div class="bg-shape bg-shape--1"></div>
<div class="bg-shape bg-shape--2"></div>
<div class="bg-shape bg-shape--3"></div>

<!-- ============================
     LOGIN SCREEN
     ============================ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-card__logo">
      <div class="login-card__logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L2 8l10 5 10-5-10-5zM2 16l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1 class="login-card__title">FCH Ingenieros</h1>
      <p class="login-card__subtitle">Sistema de Gestión de Almacenes</p>
    </div>
    <div id="login-error" class="login-card__error"></div>
    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="login-username">Usuario</label>
        <input id="login-username" class="form-input" type="text" placeholder="Ingrese su usuario" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Contraseña</label>
        <input id="login-password" class="form-input" type="password" placeholder="Ingrese su contraseña" autocomplete="current-password" required />
      </div>
      <button id="login-btn" class="btn btn--primary btn--lg btn--block" type="submit">
        Iniciar Sesión
      </button>
    </form>
  </div>
</div>

<!-- ============================
     APP SHELL
     ============================ -->
<div id="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div class="sidebar__brand-text">
        <h2>FCH Ingenieros</h2>
        <span>WMS v1.0</span>
      </div>
    </div>

    <nav class="sidebar__nav" id="sidebar-nav">
      <div class="sidebar__section-title">Principal</div>
      <a class="sidebar__link" data-page="dashboard" id="nav-dashboard">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>

      <div class="sidebar__section-title">Inventario</div>
      <a class="sidebar__link" data-page="materiales" id="nav-materiales">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
        <span>Materiales</span>
      </a>
      <a class="sidebar__link" data-page="movimientos" id="nav-movimientos">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
        <span>Movimientos</span>
      </a>
      <a class="sidebar__link" data-page="kardex" id="nav-kardex">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Kardex</span>
      </a>

      <div class="sidebar__section-title">Operaciones</div>
      <a class="sidebar__link" data-page="solicitudes" id="nav-solicitudes">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span>Solicitudes</span>
        <span class="badge" id="badge-solicitudes" style="display:none"></span>
      </a>
      <a class="sidebar__link" data-page="proyectos" id="nav-proyectos">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        <span>Proyectos</span>
      </a>

      <div class="sidebar__section-title">Administración</div>
      <a class="sidebar__link" data-page="proveedores" id="nav-proveedores">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        <span>Proveedores</span>
      </a>
      <a class="sidebar__link" data-page="personal" id="nav-personal">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Personal</span>
      </a>
      <a class="sidebar__link" data-page="usuarios" id="nav-usuarios">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Usuarios</span>
      </a>
    </nav>

    <div class="sidebar__footer">
      <div style="font-size:0.75rem;color:var(--text-muted);text-align:center">
        FCH Ingenieros © 2025
      </div>
    </div>
  </aside>

  <!-- HEADER -->
  <header class="header">
    <div class="header__left">
      <h2 class="header__title" id="header-title">Dashboard</h2>
    </div>
    <div class="header__right">
      <div class="header__user" id="header-user-info">
        <div class="header__avatar" id="header-avatar">--</div>
        <div>
          <div class="header__user-name" id="header-user-name">Usuario</div>
          <div class="header__user-role" id="header-user-role">Rol</div>
        </div>
      </div>
      <button id="btn-logout" title="Cerrar sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="main-content">
    <div class="spinner" id="page-loader"></div>
  </main>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Shared Modal (for all CRUD operations) -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal__header">
      <h2 id="modal-title">Modal</h2>
      <button class="modal__close" id="modal-close-btn" aria-label="Cerrar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal__body" id="modal-body"></div>
    <div class="modal__footer" id="modal-footer"></div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/api.js?v=1.2"></script>
<script src="js/auth.js?v=1.2"></script>
<script src="js/pages/dashboard.js?v=1.2"></script>
<script src="js/pages/materiales.js?v=1.2"></script>
<script src="js/pages/movimientos.js?v=1.2"></script>
<script src="js/pages/solicitudes.js?v=1.2"></script>
<script src="js/pages/kardex.js?v=1.2"></script>
<script src="js/pages/proyectos.js?v=1.2"></script>
<script src="js/pages/proveedores.js?v=1.2"></script>
<script src="js/pages/personal.js?v=1.2"></script>
<script src="js/pages/usuarios.js?v=1.2"></script>
<script src="js/app.js?v=1.2"></script>
</body>
</html>
